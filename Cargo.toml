[package]
name = "wicked-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "In-process composition runtime for the wicked-estate core services: a single-writer store actor + command API + live event stream that the agent, UI, and MCP servers compose through, instead of each re-opening and racing on the shared SQLite file."

[dependencies]
# The shared kernel + store seam (same pinned versions the rest of the universe uses).
wicked-apps-core = "0.2.0"
wicked-estate-core = "0.12.0"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
